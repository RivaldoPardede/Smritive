name: smritive
description: "Smritive — preserve and share your story memories."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  http: ^1.2.2
  image_picker: ^1.1.2
  google_fonts: ^8.0.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  json_serializable: ^6.8.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/custom/

flutter_launcher_icons:
  android: true
  image_path: "assets/icons/custom/smritive-icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#060d21"
  adaptive_icon_foreground: "assets/icons/custom/smritive-icon.png"

flutter_native_splash:
  color: "#060d21"
  image: "assets/icons/custom/smritive-icon.png"
  android: true
  android_gravity: center
  branding_bottom_padding: 24
  android_12:
    color: "#060d21"
    image: "assets/icons/custom/smritive-icon.png"
