name: smritive
description: "Smritive — preserve and share your story memories."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  http: ^1.2.2
  image_picker: ^1.1.2
  google_fonts: ^8.0.2
  json_annotation: ^4.9.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  json_serializable: ^6.8.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/custom/

# Launcher icons and the native splash screen are configured manually:
#  - Per-flavor adaptive icons live in android/app/src/{free,paid}/res/.
#  - Legacy splash:   android/app/src/main/res/drawable/launch_background.xml.
#  - Android 12+ splash: android/app/src/main/res/values-v31/styles.xml.
#  - Regenerate icon assets from assets/icons/custom/smritive-icon.png with:
#       pwsh tool/gen_icons.ps1
#  - The animated splash on the Flutter side is in lib/core/splash/.

