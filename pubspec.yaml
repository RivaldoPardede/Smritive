name: smritive
description: "Smritive — preserve and share your story memories."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  http: ^1.2.2
  image_picker: ^1.1.2
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
